<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Freedom Intelligence Field</title>
<style>
  :root {
    --gold: #C9A84C;
    --gold-dark: #9A6E10;
    --ink: #080808;
    --panel: #0f0f0f;
    --cream: #f0ead6;
    --cream-dim: rgba(240, 234, 214, 0.5);
    --cream-mute: rgba(240, 234, 214, 0.18);
    --gold-soft: rgba(201, 168, 76, 0.09);
    --gold-line: rgba(201, 168, 76, 0.13);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: var(--ink);
    color: var(--cream);
    font-family: Georgia, 'Times New Roman', serif;
    min-height: 100vh;
  }

  a { color: var(--gold); }

  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 16px;
    min-height: 100vh;
  }

  .card {
    width: 100%;
    max-width: 680px;
    background: var(--panel);
    border: 1px solid rgba(201, 168, 76, 0.1);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 80px rgba(201, 168, 76, 0.03), 0 24px 48px rgba(0,0,0,0.6);
  }

  .header {
    width: 100%;
    max-width: 680px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    padding: 0 2px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    display: flex; align-items: center; justify-content: center;
    color: var(--ink);
    font-size: 16px;
    box-shadow: 0 0 16px rgba(201,168,76,0.2);
  }

  .logo-text-1 {
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--gold);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
  }

  .logo-text-2 {
    font-size: 14px;
    color: var(--cream);
    font-style: italic;
    margin-top: 1px;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .time-left {
    font-size: 11px;
    color: rgba(201, 168, 76, 0.4);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .day-chip {
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--gold-soft);
    border: 1px solid rgba(201, 168, 76, 0.22);
    font-size: 10px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
  }

  /* Entry screen */
  .entry { padding: 50px 42px; text-align: center; }
  .entry-label {
    font-size: 10px;
    color: rgba(240, 234, 214, 0.3);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin-bottom: 26px;
  }
  .entry-title {
    font-size: 23px;
    color: var(--cream);
    font-style: italic;
    line-height: 1.45;
    margin-bottom: 10px;
  }
  .entry-sub {
    font-size: 13px;
    color: rgba(240, 234, 214, 0.38);
    line-height: 1.85;
    max-width: 340px;
    margin: 0 auto 40px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .entry-days {
    display: flex; gap: 8px; justify-content: center; margin-bottom: 42px;
  }
  .entry-day {
    padding: 9px 16px;
    border: 1px solid var(--gold-line);
    border-radius: 8px;
  }
  .entry-day-num {
    font-size: 9px;
    color: var(--gold);
    letter-spacing: 0.15em;
    font-weight: 700;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .entry-day-theme {
    font-size: 10px;
    color: rgba(240, 234, 214, 0.35);
    margin-top: 3px;
    letter-spacing: 0.1em;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .entry-form {
    max-width: 390px;
    margin: 0 auto;
  }
  .entry-input {
    width: 100%;
    padding: 13px 17px;
    background: rgba(201, 168, 76, 0.04);
    border: 1px solid rgba(201, 168, 76, 0.16);
    border-radius: 8px;
    color: var(--cream);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    margin-bottom: 10px;
  }
  .entry-input:focus { outline: none; border-color: rgba(201, 168, 76, 0.4); }

  .btn-primary {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border: none;
    border-radius: 8px;
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .btn-primary:disabled { opacity: 0.5; cursor: default; }

  .entry-note {
    font-size: 10px;
    color: rgba(240, 234, 214, 0.18);
    margin-top: 13px;
    line-height: 1.7;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .error-text {
    color: #ef9a9a;
    font-size: 12px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin-bottom: 10px;
    text-align: left;
  }

  /* Day tabs */
  .day-tabs {
    display: flex;
    border-bottom: 1px solid rgba(201, 168, 76, 0.07);
  }
  .day-tab {
    flex: 1;
    padding: 9px 0;
    text-align: center;
    border-right: 1px solid rgba(201, 168, 76, 0.07);
    background: transparent;
  }
  .day-tab:last-child { border-right: none; }
  .day-tab.active { background: rgba(201, 168, 76, 0.05); }
  .day-tab-label {
    font-size: 9px;
    letter-spacing: 0.14em;
    color: rgba(201, 168, 76, 0.18);
    text-transform: uppercase;
    font-weight: 400;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .day-tab.active .day-tab-label {
    color: var(--gold);
    font-weight: 700;
  }
  .day-tab-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--gold);
    margin: 3px auto 0;
    animation: pulse 2s infinite;
  }

  /* Messages */
  .messages {
    height: 440px;
    overflow-y: auto;
    padding: 22px 24px 14px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb {
    background: rgba(201, 168, 76, 0.15);
    border-radius: 2px;
  }

  .msg-row { display: flex; animation: fadeIn 0.3s ease; }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.assistant { justify-content: flex-start; }

  .msg {
    max-width: 80%;
    padding: 13px 17px;
    color: rgba(240, 234, 214, 0.88);
    font-size: 15px;
    line-height: 1.8;
    white-space: pre-wrap;
  }
  .msg-row.user .msg {
    padding: 10px 14px;
    background: rgba(201, 168, 76, 0.09);
    border: 1px solid rgba(201, 168, 76, 0.2);
    border-radius: 12px 12px 2px 12px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .msg-row.assistant .msg {
    background: rgba(240, 234, 214, 0.03);
    border: 1px solid rgba(240, 234, 214, 0.06);
    border-radius: 12px 12px 12px 2px;
    font-family: Georgia, 'Times New Roman', serif;
  }

  /* Typing */
  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 12px 16px;
    background: rgba(201, 168, 76, 0.07);
    border-radius: 12px 12px 12px 2px;
    width: fit-content;
    border: 1px solid rgba(201, 168, 76, 0.13);
  }
  .typing .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.7;
    animation: bounce 1.2s infinite;
  }
  .typing .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing .dot:nth-child(3) { animation-delay: 0.4s; }

  /* Input */
  .input-bar {
    border-top: 1px solid rgba(201, 168, 76, 0.07);
    padding: 13px 17px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    position: relative;
  }
  textarea {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--cream);
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 15px;
    line-height: 1.6;
    padding: 7px 3px;
    max-height: 100px;
    overflow-y: auto;
    resize: none;
  }
  textarea:focus { outline: none; }

  .send-btn {
    width: 37px; height: 37px;
    border-radius: 50%;
    background: rgba(201, 168, 76, 0.07);
    border: none;
    cursor: default;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    transition: all 0.2s ease;
    color: rgba(201, 168, 76, 0.2);
  }
  .send-btn.active {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--ink);
    cursor: pointer;
  }

  .footer-note {
    padding: 5px 18px 11px;
    text-align: center;
    font-size: 9px;
    color: rgba(240, 234, 214, 0.13);
    letter-spacing: 0.12em;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  /* Expired */
  .expired { padding: 52px 44px; text-align: center; }
  .expired-icon {
    font-size: 30px;
    color: var(--gold);
    margin-bottom: 18px;
  }
  .expired-title {
    font-size: 19px;
    color: var(--cream);
    font-style: italic;
    margin-bottom: 12px;
  }
  .expired-sub {
    font-size: 13px;
    color: rgba(240, 234, 214, 0.42);
    line-height: 1.85;
    max-width: 340px;
    margin: 0 auto 40px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .upgrade-card {
    padding: 17px 22px;
    border: 1px solid rgba(201, 168, 76, 0.2);
    border-radius: 10px;
    text-align: left;
    margin-bottom: 10px;
    max-width: 340px;
    margin-left: auto;
    margin-right: auto;
  }
  .upgrade-name {
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.15em;
    font-weight: 700;
    margin-bottom: 5px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .upgrade-desc {
    font-size: 13px;
    color: rgba(240, 234, 214, 0.5);
    line-height: 1.6;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
  <div id="app">
    <div class="header" id="header" style="display:none;">
      <div class="logo">
        <div class="logo-mark">◇</div>
        <div>
          <div class="logo-text-1">The Freedom Intelligence Field</div>
          <div class="logo-text-2">72 Hour Power Reset</div>
        </div>
      </div>
      <div class="status" id="status"></div>
    </div>

    <div class="card" id="card"></div>
  </div>

<script>
(function () {
  "use strict";

  // ===== Config =====
  const API_BASE = "https://myp-ascension.vercel.app/api";
  const STORAGE_KEY = "tfif_session_v1";
  const DAY_META = [
    { label: "Day 1", theme: "Truth" },
    { label: "Day 2", theme: "Decision" },
    { label: "Day 3", theme: "Action" }
  ];
  const PLACEHOLDERS = [
    "What feels most active right now?",
    "What are you no longer available for?",
    "What is the one move you will take in the next 24 hours?"
  ];

  // ===== State =====
  let state = {
    sessionToken: null,
    currentDay: 1,
    tier: "preview",
    timeRemainingMs: null,
    messages: [],
    loading: false,
    error: null
  };

  // ===== Persistence (token only — conversations live server-side) =====
  function loadToken() {
    try { return localStorage.getItem(STORAGE_KEY); }
    catch (e) { return null; }
  }
  function saveToken(token) {
    try { localStorage.setItem(STORAGE_KEY, token); }
    catch (e) {}
  }
  function clearToken() {
    try { localStorage.removeItem(STORAGE_KEY); }
    catch (e) {}
  }

  // ===== API =====
  async function apiStart(email) {
    const res = await fetch(API_BASE + "/start", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: email })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Start failed");
    return data;
  }

  async function apiState(token) {
    const res = await fetch(API_BASE + "/state", {
      method: "GET",
      headers: { "x-session-token": token }
    });
    if (res.status === 410) {
      const data = await res.json().catch(() => ({}));
      return { expired: true, _raw: data };
    }
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "State failed");
    return data;
  }

  async function apiChat(token, message) {
    const res = await fetch(API_BASE + "/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-session-token": token
      },
      body: JSON.stringify({ message: message })
    });
    if (res.status === 410) return { expired: true };
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Chat failed");
    return data;
  }

  // ===== Renders =====
  function renderEntry() {
    document.getElementById("header").style.display = "none";
    const card = document.getElementById("card");
    card.innerHTML = `
      <div class="entry">
        <div class="entry-label">72 Hour Reset</div>
        <div class="entry-title">Clarity. Decision. Action.</div>
        <div class="entry-sub">Three days. Three questions.<br/>One move that changes the trajectory.</div>
        <div class="entry-days">
          ${DAY_META.map(d => `
            <div class="entry-day">
              <div class="entry-day-num">${d.label.toUpperCase()}</div>
              <div class="entry-day-theme">${d.theme.toUpperCase()}</div>
            </div>
          `).join("")}
        </div>
        <form class="entry-form" id="entry-form">
          <input class="entry-input" id="email-input" type="email" placeholder="Your email" required />
          ${state.error ? `<div class="error-text">${state.error}</div>` : ""}
          <button class="btn-primary" type="submit">Start Day 1 — Truth</button>
          <div class="entry-note">Your conversation is private and persists across the 72 hours.</div>
        </form>
      </div>
    `;
    document.getElementById("entry-form").addEventListener("submit", onStartSubmit);
    setTimeout(() => document.getElementById("email-input").focus(), 50);
  }

  function renderExpired() {
    document.getElementById("header").style.display = "flex";
    document.getElementById("status").innerHTML = "";
    const card = document.getElementById("card");
    card.innerHTML = `
      <div class="expired">
        <div class="expired-icon">◇</div>
        <div class="expired-title">The 72 hours are complete.</div>
        <div class="expired-sub">
          The Reset has done its job.<br/><br/>
          The question now is whether you close the loop here or continue the work with deeper support.
        </div>
        <div class="upgrade-card">
          <div class="upgrade-name">The Freedom Intelligence Field</div>
          <div class="upgrade-desc">Continue this work. Keep practicing state reset, decision alignment, and aligned action with ongoing AI guidance and monthly Q&amp;A calls with Shimrit Nativ.</div>
        </div>
      </div>
    `;
  }

  function renderChat() {
    document.getElementById("header").style.display = "flex";
    renderStatus();
    const card = document.getElementById("card");
    card.innerHTML = `
      <div class="day-tabs" id="day-tabs">
        ${DAY_META.map((d, i) => `
          <div class="day-tab ${i + 1 === state.currentDay ? "active" : ""}">
            <div class="day-tab-label">${d.label} · ${d.theme}</div>
            ${i + 1 === state.currentDay ? '<div class="day-tab-dot"></div>' : ""}
          </div>
        `).join("")}
      </div>
      <div class="messages" id="messages"></div>
      <div class="input-bar">
        <textarea id="input" rows="1" placeholder="${PLACEHOLDERS[state.currentDay - 1]}"></textarea>
        <button class="send-btn" id="send-btn" type="button">↑</button>
      </div>
      <div class="footer-note">Master Your Path · Conversation persists across sessions</div>
    `;

    renderMessages();
    const inputEl = document.getElementById("input");
    inputEl.addEventListener("input", onInputChange);
    inputEl.addEventListener("keydown", onInputKeyDown);
    document.getElementById("send-btn").addEventListener("click", onSendClick);
    setTimeout(() => inputEl.focus(), 50);
  }

  function renderStatus() {
    const el = document.getElementById("status");
    if (!el) return;
    if (state.timeRemainingMs !== null && state.timeRemainingMs > 0) {
      const h = Math.floor(state.timeRemainingMs / 3600000);
      const m = Math.floor((state.timeRemainingMs % 3600000) / 60000);
      el.innerHTML = `
        <div class="time-left">${h}h ${m}m left</div>
        <div class="day-chip">${DAY_META[state.currentDay - 1].label} · ${DAY_META[state.currentDay - 1].theme}</div>
      `;
    } else {
      el.innerHTML = `<div class="day-chip">${DAY_META[state.currentDay - 1].label} · ${DAY_META[state.currentDay - 1].theme}</div>`;
    }
  }

  function renderMessages() {
    const wrap = document.getElementById("messages");
    if (!wrap) return;
    wrap.innerHTML = state.messages.map(m => `
      <div class="msg-row ${m.role}">
        <div class="msg">${escapeHtml(m.content)}</div>
      </div>
    `).join("");
    if (state.loading) {
      wrap.innerHTML += `
        <div class="msg-row assistant">
          <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>
      `;
    }
    wrap.scrollTop = wrap.scrollHeight;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  // ===== Handlers =====
  async function onStartSubmit(e) {
    e.preventDefault();
    const email = document.getElementById("email-input").value.trim();
    if (!email) return;
    state.error = null;
    try {
      const data = await apiStart(email);
      state.sessionToken = data.sessionToken;
      saveToken(data.sessionToken);
      state.currentDay = data.currentDay || 1;
      state.tier = data.tier;
      state.timeRemainingMs = data.timeRemainingMs;
      await loadStateAndRender();
    } catch (err) {
      state.error = err.message || "Could not start. Please try again.";
      renderEntry();
    }
  }

  function onInputChange(e) {
    e.target.style.height = "auto";
    e.target.style.height = Math.min(e.target.scrollHeight, 100) + "px";
    const send = document.getElementById("send-btn");
    if (e.target.value.trim() && !state.loading) send.classList.add("active");
    else send.classList.remove("active");
  }

  function onInputKeyDown(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      onSendClick();
    }
  }

  async function onSendClick() {
    const inputEl = document.getElementById("input");
    const text = inputEl.value.trim();
    if (!text || state.loading) return;

    state.messages.push({ role: "user", content: text });
    inputEl.value = "";
    inputEl.style.height = "auto";
    state.loading = true;
    renderMessages();

    try {
      const data = await apiChat(state.sessionToken, text);
      if (data.expired) {
        renderExpired();
        return;
      }
      state.messages.push({ role: "assistant", content: data.reply });
      state.currentDay = data.currentDay;
      state.timeRemainingMs = data.timeRemainingMs;
      renderStatus();
      // Re-render the day tabs if day advanced.
      const tabs = document.getElementById("day-tabs");
      if (tabs) {
        tabs.innerHTML = DAY_META.map((d, i) => `
          <div class="day-tab ${i + 1 === state.currentDay ? "active" : ""}">
            <div class="day-tab-label">${d.label} · ${d.theme}</div>
            ${i + 1 === state.currentDay ? '<div class="day-tab-dot"></div>' : ""}
          </div>
        `).join("");
      }
    } catch (err) {
      state.messages.push({
        role: "assistant",
        content: "Something went wrong. Try again in a moment."
      });
    } finally {
      state.loading = false;
      renderMessages();
    }
  }

  async function loadStateAndRender() {
    try {
      const data = await apiState(state.sessionToken);
      if (data.expired) {
        renderExpired();
        return;
      }
      state.currentDay = data.currentDay || 1;
      state.tier = data.tier;
      state.timeRemainingMs = data.timeRemainingMs;
      state.messages = data.messages || [];
      renderChat();
    } catch (err) {
      // Token invalid: clear and show entry.
      clearToken();
      state.sessionToken = null;
      state.error = "Session expired. Please start again.";
      renderEntry();
    }
  }

  // ===== Init =====
  function init() {
    const existing = loadToken();
    if (existing) {
      state.sessionToken = existing;
      loadStateAndRender();
    } else {
      renderEntry();
    }

    // Tick the time remaining every minute.
    setInterval(() => {
      if (state.timeRemainingMs !== null && state.timeRemainingMs > 0) {
        state.timeRemainingMs = Math.max(0, state.timeRemainingMs - 60000);
        renderStatus();
      }
    }, 60000);
  }

  init();
})();
</script>
</body>
</html>
