<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Freedom Intelligence Field — DEMO</title>
<style>
  html[data-theme="dark"] {
    --bg: #080808;
    --panel: #0f0f0f;
    --panel-2: #131313;
    --sidebar-bg: #0a0a0a;
    --text: #f0ead6;
    --text-dim: rgba(240, 234, 214, 0.55);
    --text-mute: rgba(240, 234, 214, 0.28);
    --gold: #C9A84C;
    --gold-soft: rgba(201, 168, 76, 0.09);
    --gold-line: rgba(201, 168, 76, 0.16);
    --gold-strong: rgba(201, 168, 76, 0.25);
    --user-msg-bg: rgba(201, 168, 76, 0.10);
    --user-msg-border: rgba(201, 168, 76, 0.22);
    --assistant-msg-bg: rgba(240, 234, 214, 0.03);
    --assistant-msg-border: rgba(240, 234, 214, 0.07);
    --border: rgba(201, 168, 76, 0.07);
    --shadow: 0 0 80px rgba(201, 168, 76, 0.03), 0 24px 48px rgba(0,0,0,0.6);
    --demo-banner: #6B2C2C;
    --demo-banner-text: #FFD1D1;
    color-scheme: dark;
  }
  html[data-theme="light"] {
    --bg: #F7F1E1;
    --panel: #FFFFFF;
    --panel-2: #FAF6E8;
    --sidebar-bg: #EFE7CE;
    --text: #1A1612;
    --text-dim: rgba(26, 22, 18, 0.65);
    --text-mute: rgba(26, 22, 18, 0.4);
    --gold: #9A6E10;
    --gold-soft: rgba(154, 110, 16, 0.07);
    --gold-line: rgba(154, 110, 16, 0.2);
    --gold-strong: rgba(154, 110, 16, 0.35);
    --user-msg-bg: rgba(154, 110, 16, 0.10);
    --user-msg-border: rgba(154, 110, 16, 0.25);
    --assistant-msg-bg: #FFFFFF;
    --assistant-msg-border: rgba(26, 22, 18, 0.08);
    --border: rgba(26, 22, 18, 0.08);
    --shadow: 0 6px 24px rgba(26, 22, 18, 0.06), 0 1px 4px rgba(26, 22, 18, 0.04);
    --demo-banner: #C84545;
    --demo-banner-text: #FFFFFF;
    color-scheme: light;
  }

  * { box-sizing: border-box; }
 html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Georgia, "Times New Roman", serif;
  min-height: 100%;
}
  button { font-family: inherit; cursor: pointer; }

  /* Demo banner */
  .demo-banner {
    background: var(--demo-banner);
    color: var(--demo-banner-text);
    padding: 8px 16px;
    text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

 #app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  width: 100%;
}
  .main-row { display: flex; flex: 1; min-height: 0; }

  /* Sidebar */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 22px 18px;
    overflow-y: auto;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 22px;
  }
  .brand-mark {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), color-mix(in srgb, var(--gold) 70%, black));
    display: flex; align-items: center; justify-content: center;
    color: var(--bg);
    font-size: 15px;
    flex-shrink: 0;
  }
  .brand-text-1 {
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--gold);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    line-height: 1.2;
  }
  .brand-text-2 {
    font-size: 13px;
    color: var(--text);
    font-style: italic;
    margin-top: 3px;
  }
  .sidebar-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-mute);
    text-transform: uppercase;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700;
    margin-bottom: 12px;
    padding: 0 4px;
  }
  .day-list {
    display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px;
  }
  .day-item {
    display: flex; align-items: center; gap: 11px;
    padding: 11px 12px; border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
    background: var(--panel);
  }
  .day-item:hover {
    border-color: var(--gold-line);
  }
  .day-item.active {
    background: var(--gold-soft);
    border-color: var(--gold-line);
  }
  .day-num {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--gold-line);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    color: var(--gold);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700;
    flex-shrink: 0;
  }
  .day-item.active .day-num {
    background: var(--gold); color: var(--bg); border-color: var(--gold);
  }
  .day-info { flex: 1; min-width: 0; }
  .day-title {
    font-size: 12px;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .day-theme {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
    margin-top: 2px;
  }

  .demo-help {
    margin-top: 8px;
    padding: 12px;
    background: var(--panel);
    border: 1px dashed var(--gold-line);
    border-radius: 8px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    line-height: 1.5;
  }

  .reset-btn {
    margin-top: 14px;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--gold-line);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.15s ease;
  }
  .reset-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .sidebar-footer {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-text {
    font-size: 10px;
    color: var(--text-mute);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: 0.05em;
  }
  .theme-toggle {
    background: transparent;
    border: 1px solid var(--gold-line);
    color: var(--text-dim);
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .theme-toggle:hover { border-color: var(--gold); color: var(--gold); }

  /* Main */
  .main {
    flex: 1; display: flex; flex-direction: column;
    min-width: 0; background: var(--bg);
  }
  .main-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
  }
  .main-header-title {
    font-size: 14px;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 600;
  }
  .main-header-sub {
    font-size: 11px;
    color: var(--text-dim);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin-top: 2px;
  }
  .day-chip {
    padding: 6px 12px;
    border-radius: 20px;
    background: var(--gold-soft);
    border: 1px solid var(--gold-line);
    font-size: 10px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .messages-wrap { flex: 1; overflow-y: auto; padding: 24px 0; }
  .messages-wrap::-webkit-scrollbar { width: 6px; }
  .messages-wrap::-webkit-scrollbar-thumb {
    background: var(--gold-strong); border-radius: 3px;
  }
  .messages {
    max-width: 760px; margin: 0 auto;
    padding: 0 28px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .msg-row { display: flex; animation: fadeIn 0.3s ease; }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.assistant { justify-content: flex-start; }
  .msg {
    max-width: 78%;
    padding: 13px 18px;
    color: var(--text);
    font-size: 15px;
    line-height: 1.75;
    white-space: pre-wrap;
  }
  .msg-row.user .msg {
    padding: 11px 16px;
    background: var(--user-msg-bg);
    border: 1px solid var(--user-msg-border);
    border-radius: 14px 14px 3px 14px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .msg-row.assistant .msg {
    background: var(--assistant-msg-bg);
    border: 1px solid var(--assistant-msg-border);
    border-radius: 14px 14px 14px 3px;
    font-family: Georgia, "Times New Roman", serif;
  }

  .typing {
    display: flex; gap: 5px; align-items: center;
    padding: 12px 16px;
    background: var(--assistant-msg-bg);
    border-radius: 14px 14px 14px 3px;
    width: fit-content;
    border: 1px solid var(--assistant-msg-border);
  }
  .typing .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.7;
    animation: bounce 1.2s infinite;
  }
  .typing .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing .dot:nth-child(3) { animation-delay: 0.4s; }

  .composer-wrap {
    border-top: 1px solid var(--border);
    padding: 16px 28px 20px;
  }
  .composer {
    max-width: 760px; margin: 0 auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px 8px 6px 14px;
    display: flex; align-items: flex-end; gap: 10px;
  }
  .composer:focus-within { border-color: var(--gold-line); }
  textarea {
    flex: 1; background: transparent; border: none;
    color: var(--text);
    font-family: Georgia, "Times New Roman", serif;
    font-size: 15px; line-height: 1.6;
    padding: 12px 4px;
    max-height: 200px; overflow-y: auto;
    resize: none;
  }
  textarea:focus { outline: none; }
  textarea::placeholder { color: var(--text-mute); }
  .send-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--gold-soft);
    border: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
    color: var(--text-mute);
    cursor: default;
    margin-bottom: 4px;
  }
  .send-btn.active {
    background: linear-gradient(135deg, var(--gold), color-mix(in srgb, var(--gold) 70%, black));
    color: var(--bg);
    cursor: pointer;
  }

  .composer-note {
    max-width: 760px; margin: 8px auto 0;
    text-align: center;
    font-size: 11px;
    color: var(--text-mute);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  /* Entry */
  .entry-screen { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .entry-card {
    max-width: 460px; width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 44px 38px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .entry-label {
    font-size: 10px;
    color: var(--text-mute);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin-bottom: 22px;
  }
  .entry-title {
    font-size: 26px;
    color: var(--text);
    font-style: italic;
    line-height: 1.4;
    margin-bottom: 10px;
  }
  .entry-sub {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.8;
    margin: 0 auto 28px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    text-align: left;
  }
  .entry-input {
    width: 100%;
    padding: 13px 17px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    margin-bottom: 12px;
  }
  .entry-input:focus { outline: none; border-color: var(--gold-line); }
  .btn-primary {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--gold), color-mix(in srgb, var(--gold) 70%, black));
    border: none;
    border-radius: 8px;
    color: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .error-text {
    color: #e57373;
    font-size: 12px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin-bottom: 10px;
    text-align: left;
  }

  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 720px) {
    .sidebar { width: 220px; padding: 16px 12px; }
    .messages, .composer { padding-left: 16px; padding-right: 16px; }
  }
 @media (max-width: 560px) {
  .main-row { flex-direction: column; }
  .sidebar {
    width: 100%;
    max-height: none;
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    flex-shrink: 0;
  }
  .brand { padding-bottom: 14px; margin-bottom: 14px; }
  .day-list { flex-direction: row; gap: 6px; margin-bottom: 12px; overflow-x: auto; }
  .day-item { flex-shrink: 0; padding: 8px 12px; gap: 8px; }
  .day-info { display: flex; flex-direction: column; min-width: 0; }
.day-title { font-size: 9px; line-height: 1.1; letter-spacing: 0.08em; }
.day-theme { font-size: 11px; font-weight: 600; font-style: normal; margin-top: 2px; letter-spacing: 0.02em; }
.day-item .day-num { width: 22px; height: 22px; font-size: 10px; }
.day-item.active .day-theme { color: var(--gold); }
  .demo-help { display: none; }
  .reset-btn { margin-top: 6px; padding: 8px; }
  .sidebar-footer { padding-top: 12px; margin-top: 12px; }
}
</style>
</head>
<body>
  <div id="app"></div>

<script>
(function () {
  "use strict";

  const API_BASE = "https://myp-ascension.vercel.app/api";
  const STORAGE_KEY = "tfif_demo_session_v1";
  const ANON_KEY = "tfif_demo_anon_id";
  const THEME_KEY = "tfif_theme_v1";
  const DAY_META = [
    { label: "Day 1", theme: "Truth" },
    { label: "Day 2", theme: "Decision" },
    { label: "Day 3", theme: "Action" }
  ];
  const PLACEHOLDERS = [
    "What feels most active right now?",
    "What are you no longer available for?",
    "What is the one move you will take in the next 24 hours?"
  ];

  const state = {
    sessionToken: null,
    currentDay: 1,
    lastCompletedDay: 0,
    timeRemainingMs: null,
    messages: [],
    loading: false,
    error: null,
    view: "entry"
  };

  // ===== Persistence =====
  function loadToken() { try { return localStorage.getItem(STORAGE_KEY); } catch (e) { return null; } }
  function saveToken(t) { try { localStorage.setItem(STORAGE_KEY, t); } catch (e) {} }
  function clearToken() { try { localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(ANON_KEY); } catch (e) {} }
  function loadTheme() { try { return localStorage.getItem(THEME_KEY) || "dark"; } catch (e) { return "dark"; } }
  function saveTheme(t) { try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
  function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    saveTheme(theme);
  }

  function generateAnonId() {
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function (c) {
      const r = Math.random() * 16 | 0;
      const v = c === "x" ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  }
  function getOrCreateAnonId() {
    try {
      let id = localStorage.getItem(ANON_KEY);
      if (!id) {
        id = generateAnonId();
        localStorage.setItem(ANON_KEY, id);
      }
      return id;
    } catch (e) { return generateAnonId(); }
  }

  // ===== API =====
  async function apiStart(email, displayName) {
    const res = await fetch(API_BASE + "/start", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, displayName: displayName || null })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Could not start");
    return data;
  }
  async function apiState(token) {
    const res = await fetch(API_BASE + "/state", {
      method: "GET",
      headers: { "x-session-token": token }
    });
    if (res.status === 410) return { expired: true };
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Could not load state");
    return data;
  }
  async function apiChat(token, message) {
    const res = await fetch(API_BASE + "/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-session-token": token },
      body: JSON.stringify({ message })
    });
    if (res.status === 410) return { expired: true };
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Could not send");
    return data;
  }
  async function apiSetDay(token, day) {
    const res = await fetch(API_BASE + "/demo-set-day", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-session-token": token },
      body: JSON.stringify({ day })
    });
    if (res.status === 404) throw new Error("Demo mode not enabled on backend (set DEMO_MODE_ENABLED=true in Vercel).");
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Could not set day");
    return data;
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // ===== Renderers =====
  function renderSidebar() {
    const currentTheme = document.documentElement.getAttribute("data-theme") || "dark";
    const themeIcon = currentTheme === "dark" ? "☀" : "☾";
    return `
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">◇</div>
          <div>
            <div class="brand-text-1">Master Your Path</div>
            <div class="brand-text-2">Freedom Intelligence Field</div>
          </div>
        </div>

        <div class="sidebar-label">Switch Day (demo only)</div>
        <div class="day-list">
          ${DAY_META.map((d, i) => {
            const dayNum = i + 1;
            const isCurrent = dayNum === state.currentDay;
            return `
              <div class="day-item ${isCurrent ? "active" : ""}" data-day="${dayNum}">
                <div class="day-num">${dayNum}</div>
                <div class="day-info">
                  <div class="day-title">${d.label}</div>
                  <div class="day-theme">${d.theme}</div>
                </div>
              </div>
            `;
          }).join("")}
        </div>

        <div class="demo-help">Click a day above to switch the AI's prompt instantly. Use the reset button to start a fresh conversation.</div>

        ${state.sessionToken ? `<button class="reset-btn" id="reset-btn">Reset conversation</button>` : ""}

        <div class="sidebar-footer">
          <div class="footer-text">DEMO v1.0</div>
          <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">${themeIcon}</button>
        </div>
      </aside>
    `;
  }

  function render() {
    const app = document.getElementById("app");

    if (state.view === "entry") {
      app.innerHTML = `
        <div class="demo-banner">⚠ Demo Mode · Internal Testing Only</div>
        <div class="main-row">
          ${renderSidebar()}
          <main class="main">
            <div class="main-header">
              <div>
                <div class="main-header-title">Begin a test conversation</div>
                <div class="main-header-sub">Demo build</div>
              </div>
            </div>
            <div class="entry-screen">
              <div class="entry-card">
                <div class="entry-label">The Freedom Intelligence Field</div>
                <div class="entry-title">Welcome to Day 1: State Reset</div>
                <div class="entry-sub">Today we are not solving everything. We are locating what is currently active, what has been directing you, and how to return to yourself.</div>
                <form id="entry-form">
                  <input class="entry-input" id="name-input" type="text" placeholder="Your name (optional)" autocomplete="given-name" />
                  <textarea class="entry-input" id="opening-input" rows="4" placeholder="Start with one sentence. What is happening right now?" required style="font-family: Georgia, 'Times New Roman', serif; line-height: 1.6;"></textarea>
                  ${state.error ? `<div class="error-text">${escapeHtml(state.error)}</div>` : ""}
                  <button class="btn-primary" type="submit">Begin Day 1</button>
                </form>
              </div>
            </div>
          </main>
        </div>
      `;
      document.getElementById("entry-form").addEventListener("submit", onStartSubmit);
      setTimeout(() => document.getElementById("name-input").focus(), 50);
    } else if (state.view === "chat") {
      app.innerHTML = `
        <div class="demo-banner">⚠ Demo Mode · Click any day in the sidebar to switch instantly</div>
        <div class="main-row">
          ${renderSidebar()}
          <main class="main">
            <div class="main-header">
              <div>
                <div class="main-header-title">${DAY_META[state.currentDay - 1].label} · ${DAY_META[state.currentDay - 1].theme}</div>
                <div class="main-header-sub">Demo · Backend reports current day = ${state.currentDay}</div>
              </div>
              <div>
                <div class="day-chip">${DAY_META[state.currentDay - 1].label} · ${DAY_META[state.currentDay - 1].theme}</div>
              </div>
            </div>
            <div class="messages-wrap" id="messages-wrap">
              <div class="messages" id="messages"></div>
            </div>
            <div class="composer-wrap">
              <div class="composer">
                <textarea id="input" rows="1" placeholder="${PLACEHOLDERS[state.currentDay - 1]}"></textarea>
                <button class="send-btn" id="send-btn" type="button">↑</button>
              </div>
              <div class="composer-note">Demo mode. Conversation history is preserved across day switches.</div>
            </div>
          </main>
        </div>
      `;
      renderMessages();
      document.getElementById("input").addEventListener("input", onInputChange);
      document.getElementById("input").addEventListener("keydown", onInputKeyDown);
      document.getElementById("send-btn").addEventListener("click", onSendClick);
      setTimeout(() => document.getElementById("input").focus(), 50);
    }

    // Wire up controls present in every view.
    const themeBtn = document.getElementById("theme-toggle");
    if (themeBtn) themeBtn.addEventListener("click", onThemeToggle);
    const resetBtn = document.getElementById("reset-btn");
    if (resetBtn) resetBtn.addEventListener("click", onReset);
    // Day items only clickable in chat view.
    if (state.view === "chat") {
      document.querySelectorAll(".day-item").forEach(el => {
        el.addEventListener("click", () => onDayClick(parseInt(el.dataset.day, 10)));
      });
    }
  }

  function renderMessages() {
    const wrap = document.getElementById("messages");
    if (!wrap) return;
    let html = state.messages.map(m => `
      <div class="msg-row ${m.role}">
        <div class="msg">${escapeHtml(m.content)}</div>
      </div>
    `).join("");
    if (state.loading) {
      html += `
        <div class="msg-row assistant">
          <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>
      `;
    }
    wrap.innerHTML = html;
    const wrapper = document.getElementById("messages-wrap");
    if (wrapper) wrapper.scrollTop = wrapper.scrollHeight;
  }

  // ===== Handlers =====
  function onThemeToggle() {
    const current = document.documentElement.getAttribute("data-theme") || "dark";
    const next = current === "dark" ? "light" : "dark";
    applyTheme(next);
    render();
  }

  async function onStartSubmit(e) {
    e.preventDefault();
    const name = (document.getElementById("name-input").value || "").trim();
    const opening = (document.getElementById("opening-input").value || "").trim();
    if (!opening) return;
    state.error = null;
    try {
      const anonId = getOrCreateAnonId();
      const syntheticEmail = "demo-" + anonId + "@tfif.local";
      const data = await apiStart(syntheticEmail, name);
      state.sessionToken = data.sessionToken;
      saveToken(data.sessionToken);
      state.currentDay = data.currentDay || 1;
      state.timeRemainingMs = data.timeRemainingMs;
      state.view = "chat";
      state.messages = [{ role: "user", content: opening }];
      state.loading = true;
      render();
      const chatData = await apiChat(state.sessionToken, opening);
      if (chatData.expired) { state.view = "entry"; state.error = "Window expired."; state.loading = false; render(); return; }
      state.messages.push({ role: "assistant", content: chatData.reply });
      state.currentDay = chatData.currentDay;
      state.loading = false;
      render();
    } catch (err) {
      state.error = err.message || "Could not start.";
      state.loading = false;
      state.view = "entry";
      render();
    }
  }

  function onInputChange(e) {
    e.target.style.height = "auto";
    e.target.style.height = Math.min(e.target.scrollHeight, 200) + "px";
    const send = document.getElementById("send-btn");
    if (e.target.value.trim() && !state.loading) send.classList.add("active");
    else send.classList.remove("active");
  }

  function onInputKeyDown(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); onSendClick(); }
  }

  async function onSendClick() {
    const inputEl = document.getElementById("input");
    if (!inputEl) return;
    const text = inputEl.value.trim();
    if (!text || state.loading) return;
    state.messages.push({ role: "user", content: text });
    inputEl.value = "";
    inputEl.style.height = "auto";
    state.loading = true;
    document.getElementById("send-btn").classList.remove("active");
    renderMessages();
    try {
      const data = await apiChat(state.sessionToken, text);
      if (data.expired) { state.error = "Window expired."; state.loading = false; render(); return; }
      state.messages.push({ role: "assistant", content: data.reply });
      state.currentDay = data.currentDay;
      state.loading = false;
      render();
    } catch (err) {
      state.messages.push({ role: "assistant", content: "Demo error: " + (err.message || "could not send.") });
      state.loading = false;
      renderMessages();
    }
  }

  async function onDayClick(day) {
    if (!state.sessionToken || day === state.currentDay) return;
    state.loading = true;
    renderMessages();
    try {
      const data = await apiSetDay(state.sessionToken, day);
      state.currentDay = data.currentDay;
      state.lastCompletedDay = data.lastCompletedDay;
      // Render the AI's canonical opening for the new day as a real assistant
      // message. The backend has already persisted it to the database.
      if (data.opening) {
        state.messages.push({
          role: "assistant",
          content: data.opening
        });
      }
      state.loading = false;
      render();
    } catch (err) {
      state.messages.push({ role: "assistant", content: "Demo error: " + (err.message || "could not switch day.") });
      state.loading = false;
      renderMessages();
    }
  }

  function onReset() {
    if (!confirm("Reset this demo conversation? A fresh anonymous user will be created on next message.")) return;
    clearToken();
    state.sessionToken = null;
    state.currentDay = 1;
    state.lastCompletedDay = 0;
    state.messages = [];
    state.view = "entry";
    render();
  }

  async function loadFullState() {
    try {
      const data = await apiState(state.sessionToken);
      if (data.expired) { state.view = "entry"; render(); return; }
      state.currentDay = data.currentDay || 1;
      state.lastCompletedDay = data.lastCompletedDay || 0;
      state.timeRemainingMs = data.timeRemainingMs;
      state.messages = data.messages || [];
      state.view = "chat";
      render();
    } catch (err) {
      clearToken();
      state.sessionToken = null;
      state.view = "entry";
      render();
    }
  }

  function init() {
    applyTheme(loadTheme());
    const existing = loadToken();
    if (existing) {
      state.sessionToken = existing;
      loadFullState();
    } else {
      state.view = "entry";
      render();
    }
  }

  init();
})();
</script>
</body>
</html>
